name: Pull latest gocartio/cartogram-web image on host (go-cart.io)

on:
  # only when triggered manually, after we have tested it ourselves
  workflow_dispatch:
  push:
    branches: [ "main", "create-github-action-to-pull-new-image" ]

jobs:
  pull-new-cartogram-web-image:
    runs-on: ubuntu-latest
    steps:
      - name: Run tmate
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Debug SSH command
        env:
          USERNAME: ${{ secrets.SERVER_USERNAME }}
        run: |
          echo "$KEY" > ssh_key
          # Secure the file by setting permissions
          chmod 600 ssh_key
          ssh-add ssh_key
          ssh -vvv -o StrictHostKeyChecking=no $USERNAME@167.71.207.86 "echo 'SSH connection successful'" > ssh-output.txt 2>&1

